<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>天井計算スルヨちゃん</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4ff;
    }
    .container {
      max-width: 520px;
      margin: 40px auto;
      background: #ffffff;
      border: 2px solid #3b82f6;
      border-radius: 10px;
      padding: 20px;
      position: relative;
    }
    h1 {
      font-size: 20px;
      text-align: center;
      margin-bottom: 20px;
      color: #1e3a8a;
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .inline {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    input[type="number"],
    input[type="date"] {
      padding: 6px;
      font-size: 14px;
    }
    .period-options label {
      display: block;
      margin-bottom: 6px;
      font-weight: normal;
    }
    .checkbox-group label {
      display: block;
      margin-bottom: 4px;
    }
    .helper-text {
      margin-top: 8px;
      font-size: 13px;
      color: #334155;
    }
    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    #result {
      margin-top: 16px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
    }
    .credit {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 12px;
    }
    .credit a {
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="credit">
      <a href="https://x.com/yucky_games" target="_blank">made by ゆっきー</a>
    </div>

    <h1>天井計算スルヨちゃん</h1>

    <div class="field">
      <label>① 今所持している青輝石は？</label>
      <div class="inline">
        <input type="number" id="stone" value="0">
        <span>個</span>
      </div>
    </div>

    <div class="field">
      <label>② いつからいつまでためますか？</label>
      <div class="inline">
        <span>開始日</span>
        <input type="date" id="startDate">
      </div>
      <div class="period-options">
        <label><input type="radio" name="periodOption" value="1month" checked> １か月</label>
        <label><input type="radio" name="periodOption" value="3months"> ３か月</label>
        <label><input type="radio" name="periodOption" value="6months"> 半年</label>
        <label><input type="radio" name="periodOption" value="summer"> 夏のハーフアニバーサリーまで</label>
        <label><input type="radio" name="periodOption" value="winter"> 冬のアニバーサリーまで</label>
        <label><input type="radio" name="periodOption" value="custom"> 日付を指定する</label>
      </div>
      <div class="field" id="customEndDateField" hidden>
        <label>終了日</label>
        <input type="date" id="endDate">
      </div>
      <div class="helper-text" id="targetDatePreview"></div>
    </div>

    <div class="field">
      <label>③ 購入してるサブスク課金</label>
      <div class="checkbox-group">
        <label><input type="checkbox" id="monthly"> マンスリーパッケージ</label>
        <label><input type="checkbox" id="half"> マンスリーパッケージハーフ</label>
      </div>
    </div>

    <div class="field">
      <label>④ 追加オプション</label>
      <div class="checkbox-group">
        <label><input type="checkbox" id="anniv"> 周年での配布石や配布チケットを計算に含める</label>
      </div>
    </div>

    <button onclick="calculate()">計算する</button>

    <div id="result"></div>
  </div>

<script>
function parseDateInput(value) {
  if (!value) return null;

  const parts = value.split("-").map(Number);
  if (parts.length !== 3 || parts.some(Number.isNaN)) return null;

  return new Date(parts[0], parts[1] - 1, parts[2]);
}

function formatDateInput(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function formatDateLabel(date) {
  const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
  return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 (${weekdays[date.getDay()]})`;
}

function addMonthsClamped(date, months) {
  const targetMonthStart = new Date(date.getFullYear(), date.getMonth() + months, 1);
  const lastDay = new Date(
    targetMonthStart.getFullYear(),
    targetMonthStart.getMonth() + 1,
    0
  ).getDate();

  return new Date(
    targetMonthStart.getFullYear(),
    targetMonthStart.getMonth(),
    Math.min(date.getDate(), lastDay)
  );
}

function getNthWeekdayOfMonth(year, monthIndex, weekday, nth) {
  const firstDay = new Date(year, monthIndex, 1);
  const offset = (weekday - firstDay.getDay() + 7) % 7;
  return new Date(year, monthIndex, 1 + offset + (nth - 1) * 7);
}

function getSummerHalfAnniversaryForYear(year) {
  return getNthWeekdayOfMonth(year, 6, 2, 4);
}

function getWinterAnniversaryForYear(year) {
  return getNthWeekdayOfMonth(year, 0, 1, 4);
}

function getNextSummerHalfAnniversary(start) {
  let year = start.getFullYear();
  let target = getSummerHalfAnniversaryForYear(year);

  if (target < start) {
    year += 1;
    target = getSummerHalfAnniversaryForYear(year);
  }

  return target;
}

function getNextWinterAnniversary(start) {
  let year = start.getFullYear();
  let target = getWinterAnniversaryForYear(year);

  if (target < start) {
    year += 1;
    target = getWinterAnniversaryForYear(year);
  }

  return target;
}

function countAnniversaryRewards(start, end) {
  let count = 0;

  for (let year = start.getFullYear(); year <= end.getFullYear(); year += 1) {
    const summer = getSummerHalfAnniversaryForYear(year);
    const winter = getWinterAnniversaryForYear(year);

    if (summer > start && summer <= end) {
      count += 1;
    }

    if (winter > start && winter <= end) {
      count += 1;
    }
  }

  return count;
}

function getSelectedPeriodOption() {
  const selected = document.querySelector('input[name="periodOption"]:checked');
  return selected ? selected.value : "1month";
}

function resolveEndDate(start, periodOption) {
  if (!start) return null;

  if (periodOption === "1month") return addMonthsClamped(start, 1);
  if (periodOption === "3months") return addMonthsClamped(start, 3);
  if (periodOption === "6months") return addMonthsClamped(start, 6);
  if (periodOption === "summer") return getNextSummerHalfAnniversary(start);
  if (periodOption === "winter") return getNextWinterAnniversary(start);
  if (periodOption === "custom") {
    return parseDateInput(document.getElementById("endDate").value);
  }

  return null;
}

function getDiffInDays(start, end) {
  const utcStart = Date.UTC(start.getFullYear(), start.getMonth(), start.getDate());
  const utcEnd = Date.UTC(end.getFullYear(), end.getMonth(), end.getDate());
  return Math.max(0, Math.floor((utcEnd - utcStart) / (1000 * 60 * 60 * 24)));
}

function updatePeriodUi() {
  const start = parseDateInput(document.getElementById("startDate").value);
  const endDateField = document.getElementById("customEndDateField");
  const endDateInput = document.getElementById("endDate");
  const preview = document.getElementById("targetDatePreview");
  const periodOption = getSelectedPeriodOption();

  endDateField.hidden = periodOption !== "custom";

  if (start) {
    endDateInput.min = formatDateInput(start);
  } else {
    endDateInput.min = "";
  }

  const end = resolveEndDate(start, periodOption);

  if (!start) {
    preview.innerText = "開始日を選択してください。";
    return;
  }

  if (periodOption === "custom") {
    if (!end) {
      preview.innerText = "終了日を指定してください。";
      return;
    }

    if (end < start) {
      preview.innerText = "終了日は開始日以降を選択してください。";
      return;
    }
  }

  if (!end) {
    preview.innerText = "";
    return;
  }

  preview.innerText = `終了日: ${formatDateLabel(end)}`;
}

function calculate() {
  const result = document.getElementById("result");
  const X = Number(document.getElementById("stone").value) || 0;

  const start = parseDateInput(document.getElementById("startDate").value);
  const periodOption = getSelectedPeriodOption();
  const end = resolveEndDate(start, periodOption);

  if (!start) {
    result.innerText = "開始日を選択してください。";
    return;
  }

  if (!end) {
    result.innerText = "終了日を選択してください。";
    return;
  }

  if (end < start) {
    result.innerText = "終了日は開始日以降を選択してください。";
    return;
  }

  const Y = getDiffInDays(start, end);

  const monthly = document.getElementById("monthly").checked;
  const half = document.getElementById("half").checked;

  let Z = 0;
  if (monthly && half) Z = 78;
  else if (monthly) Z = 53;
  else if (half) Z = 26;

  const annivRewardCount = document.getElementById("anniv").checked
    ? countAnniversaryRewards(start, end)
    : 0;
  const M = annivRewardCount * 15000;

  let W = (X + Y * (Z + 400) + M) / 24000;

  // rounding to 0.5 step
  const integer = Math.floor(W);
  const decimal = W - integer;

  if (decimal >= 0.1 && decimal <= 0.4) {
    W = integer + 0.5;
  } else if (decimal >= 0.6) {
    W = integer + 1.0;
  } else {
    W = Math.round(W * 2) / 2;
  }

  result.innerText =
    "溜まっている石は　おおよそ " + W.toFixed(1) + " 天井分。";
}

function initializeForm() {
  const today = new Date();
  const startDateInput = document.getElementById("startDate");
  const endDateInput = document.getElementById("endDate");

  startDateInput.value = formatDateInput(today);
  endDateInput.value = formatDateInput(today);

  startDateInput.addEventListener("change", updatePeriodUi);
  endDateInput.addEventListener("change", updatePeriodUi);

  document.querySelectorAll('input[name="periodOption"]').forEach((input) => {
    input.addEventListener("change", updatePeriodUi);
  });

  updatePeriodUi();
}

initializeForm();
</script>
</body>
</html>
